<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EpoxyCreations Estimator</title>
<style>
  :root {
    --bg: #f6f7f9; --card: #fff; --ink: #1a2233; --muted: #67718a;
    --line: #e3e7ee; --accent: #d6336c; --accent-ink: #fff;
    --chip-new: #e7f0ff; --chip-new-ink: #1c5fd4;
    --chip-quote: #fff4e0; --chip-quote-ink: #a05a00;
    --chip-sent: #e5f7ec; --chip-sent-ink: #1c7c43;
    --chip-closed: #eef0f4; --chip-closed-ink: #67718a;
    --late: #c22040;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); }
  header { display: flex; align-items: baseline; gap: 14px; padding: 18px 26px 10px; }
  header h1 { font-size: 20px; margin: 0; }
  header .sub { color: var(--muted); font-size: 13px; }
  .filters { padding: 0 26px 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .filters button { border: 1px solid var(--line); background: var(--card); border-radius: 999px; padding: 5px 14px; font-size: 13px; cursor: pointer; color: var(--muted); }
  .filters button.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  main { display: grid; grid-template-columns: minmax(430px, 1fr) minmax(420px, 560px); gap: 18px; padding: 0 26px 30px; align-items: start; }
  @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
  .list { display: flex; flex-direction: column; gap: 8px; }
  .row { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 12px 16px; cursor: pointer; display: grid; grid-template-columns: 1fr auto auto; gap: 2px 10px; align-items: start; }
  .row:hover { border-color: #b8c2d6; }
  .row .close-btn { grid-row: 1 / 3; align-self: center; border: 1px solid var(--line); background: #fff; color: var(--muted); border-radius: 8px; padding: 4px 9px; font-size: 12px; cursor: pointer; visibility: hidden; }
  .row:hover .close-btn { visibility: visible; }
  .row .close-btn:hover { color: var(--late); border-color: var(--late); }
  .row.sel { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .row .name { font-weight: 600; }
  .row .meta { color: var(--muted); font-size: 13px; }
  .row .due { text-align: right; font-size: 13px; color: var(--muted); white-space: nowrap; }
  .row .due.late { color: var(--late); font-weight: 600; }
  .chip { justify-self: end; font-size: 12px; padding: 2px 10px; border-radius: 999px; background: var(--chip-new); color: var(--chip-new-ink); }
  .chip.quote, .chip.takeoff, .chip.approved { background: var(--chip-quote); color: var(--chip-quote-ink); }
  .chip.sent, .chip.won { background: var(--chip-sent); color: var(--chip-sent-ink); }
  .chip.lost, .chip.declined, .chip.archived { background: var(--chip-closed); color: var(--chip-closed-ink); }
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 18px 20px; position: sticky; top: 14px; }
  .panel h2 { margin: 0 0 2px; font-size: 17px; }
  .panel .client { color: var(--muted); margin-bottom: 12px; }
  .kv { display: grid; grid-template-columns: 110px 1fr; gap: 4px 10px; font-size: 13.5px; margin-bottom: 12px; }
  .kv dt { color: var(--muted); } .kv dd { margin: 0; }
  .panel a { color: #1c5fd4; }
  .section { border-top: 1px solid var(--line); margin-top: 14px; padding-top: 12px; }
  .section h3 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
  select, input[type=number], textarea { font: inherit; border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px; width: 100%; background: #fff; }
  textarea { min-height: 60px; resize: vertical; }
  .qgrid { display: grid; grid-template-columns: 1fr 110px 110px; gap: 8px; margin-bottom: 8px; }
  .preps { display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 13.5px; margin-bottom: 8px; }
  .quote-out { background: #f8f9fb; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; font-size: 13.5px; }
  .quote-out .ln { display: flex; justify-content: space-between; gap: 12px; }
  .quote-out .total { font-weight: 700; border-top: 1px solid var(--line); margin-top: 6px; padding-top: 6px; display: flex; justify-content: space-between; }
  .quote-out .note { color: var(--muted); font-size: 12.5px; margin-top: 6px; }
  .emails { font-size: 13px; max-height: 180px; overflow-y: auto; }
  .emails .em { display: flex; gap: 8px; padding: 3px 0; color: var(--muted); }
  .emails .kind { flex: none; width: 76px; font-weight: 600; }
  .btnrow { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  button.primary { background: var(--accent); color: var(--accent-ink); border: 0; border-radius: 8px; padding: 8px 16px; font: inherit; font-weight: 600; cursor: pointer; }
  button.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 8px 16px; font: inherit; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  .saved { color: #1c7c43; font-size: 13px; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
  .aibox { background: #f4f0ff; border: 1px solid #ddd2f7; border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-top: 8px; }
  .aibox .conf { font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: .05em; }
  .aibox ul { margin: 6px 0 0 18px; padding: 0; }
  .plans { font-size: 12.5px; color: var(--muted); }
  .plans code { background: #eef0f4; padding: 1px 5px; border-radius: 4px; font-size: 11.5px; word-break: break-all; }
  .warn { background: #fff6e5; border: 1px solid #f2dcae; border-radius: 8px; padding: 9px 12px; font-size: 12.5px; margin-top: 8px; }
  .sendgrid { display: grid; grid-template-columns: 1fr; gap: 6px; margin-top: 8px; }
  .sendgrid input[type=text] { font: inherit; border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px; width: 100%; }
</style>
</head>
<body>
<header>
  <h1>EpoxyCreations Estimator</h1>
  <span class="sub" id="counts"></span>
</header>
<div class="filters" id="filters"></div>
<main>
  <div class="list" id="list"></div>
  <div class="panel" id="panel"><div class="empty">Select a bid</div></div>
</main>
<script>
const STATUSES = ['new','takeoff','quote','approved','sent','won','lost','declined','archived'];
const FILTERS = ['active','new','quote','sent','closed','all'];
let bids = {}, rules = {}, selKey = null, filter = 'active';

const $ = s => document.querySelector(s);
const esc = s => (s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const dueDate = b => { const d = new Date(b.due ?? ''); return isNaN(d) ? null : d; };
const money = n => '$' + Number(n).toLocaleString(undefined, {minimumFractionDigits: n % 1 ? 2 : 0});
const isClosed = s => ['won','lost','declined','archived'].includes(s);

function visible() {
  return Object.entries(bids).filter(([, b]) => {
    if (filter === 'all') return true;
    if (filter === 'closed') return isClosed(b.status);
    if (filter === 'active') return !isClosed(b.status);
    if (filter === 'new') return b.status === 'new' || b.status === 'takeoff';
    if (filter === 'quote') return b.status === 'quote' || b.status === 'approved';
    if (filter === 'sent') return b.status === 'sent';
  }).sort((a, b) => (dueDate(a[1]) ?? new Date('2100-01-01')) - (dueDate(b[1]) ?? new Date('2100-01-01')));
}

function renderFilters() {
  const overdue = Object.entries(bids).filter(([, b]) => !isClosed(b.status) && dueDate(b) && dueDate(b) < new Date()).length;
  $('#filters').innerHTML = FILTERS.map(f =>
    `<button class="${f === filter ? 'on' : ''}" onclick="filter='${f}';render()">${f}</button>`).join('') +
    (overdue ? `<button style="margin-left:auto;color:var(--late)" onclick="archiveOverdue()">archive ${overdue} overdue</button>` : '');
}

async function quickClose(ev, key, status) {
  ev.stopPropagation();
  bids[key] = await fetch('/api/bids/' + encodeURIComponent(key), { method: 'POST', body: JSON.stringify({ status }) }).then(r => r.json());
  render();
}

async function archiveOverdue() {
  const targets = Object.entries(bids).filter(([, b]) => !isClosed(b.status) && dueDate(b) && dueDate(b) < new Date());
  if (!confirm(`Archive ${targets.length} bid(s) whose due date has passed?\n\n${targets.map(([, b]) => '• ' + b.project).join('\n')}`)) return;
  for (const [k] of targets) {
    bids[k] = await fetch('/api/bids/' + encodeURIComponent(k), { method: 'POST', body: JSON.stringify({ status: 'archived' }) }).then(r => r.json());
  }
  render();
}

function renderList() {
  const rows = visible();
  const now = new Date();
  $('#counts').textContent = `${rows.length} bid${rows.length === 1 ? '' : 's'}`;
  $('#list').innerHTML = rows.length ? rows.map(([k, b]) => {
    const d = dueDate(b);
    const late = d && d < now && !isClosed(b.status);
    return `<div class="row ${k === selKey ? 'sel' : ''}" onclick="select('${esc(k)}')">
      <div class="name">${esc(b.project)}</div>
      <div class="due ${late ? 'late' : ''}">${d ? 'due ' + d.toLocaleDateString() : ''}</div>
      ${!isClosed(b.status) ? `<button class="close-btn" title="Decline this bid" onclick="quickClose(event,'${esc(k)}','declined')">✕ decline</button>` : '<span></span>'}
      <div class="meta">${esc(b.client ?? 'GC unknown')}${b.trade ? ' · ' + esc(b.trade) : ''} · ${b.emails?.length ?? 0} email${(b.emails?.length ?? 0) === 1 ? '' : 's'}</div>
      <div class="chip ${esc(b.status)}">${esc(b.status)}</div>
    </div>`;
  }).join('') : '<div class="empty">Nothing here</div>';
}

function renderPanel() {
  const b = bids[selKey];
  if (!b) { $('#panel').innerHTML = '<div class="empty">Select a bid</div>'; return; }
  const t = b.takeoff ?? {};
  $('#panel').innerHTML = `
    <h2>${esc(b.project)}</h2>
    <div class="client">${esc(b.client ?? 'GC unknown')}${b.lead ? ' — ' + esc(b.lead) : ''}</div>
    <dl class="kv">
      <dt>Status</dt><dd><select id="status" onchange="saveBid()">${STATUSES.map(s => `<option ${s === b.status ? 'selected' : ''}>${s}</option>`).join('')}</select></dd>
      <dt>Due</dt><dd>${esc(b.due ?? '—')}</dd>
      <dt>Location</dt><dd>${esc(b.location ?? '—')}</dd>
      <dt>Contact</dt><dd>${esc(b.contactEmail ?? '—')}${b.contactPhone ? ' · ' + esc(b.contactPhone) : ''}</dd>
      <dt>Invite</dt><dd>${b.link ? `<a href="${esc(b.link)}" target="_blank">open in BuildingConnected</a>` : '—'}</dd>
    </dl>
    <div class="section">
      <h3>Quote builder</h3>
      <div class="qgrid">
        <select id="q-system">${Object.entries(rules.systems).map(([k, v]) => `<option value="${k}" ${t.system === k ? 'selected' : ''}>${esc(v)}</option>`).join('')}</select>
        <input id="q-sqft" type="number" placeholder="sq ft" value="${t.sqft ?? ''}">
        <input id="q-cove" type="number" placeholder="cove LF" value="${t.coveLf ?? ''}">
      </div>
      <div class="preps">${Object.entries(rules.prep).map(([k, v]) =>
        `<label><input type="checkbox" name="prep" value="${k}" ${(t.prep ?? []).includes(k) ? 'checked' : ''}> ${esc(v)}</label>`).join('')}</div>
      <div class="quote-out" id="q-out">Enter a takeoff to price.</div>
      <div class="section">
        <h3>Notes</h3>
        <textarea id="notes" placeholder="Takeoff notes, exclusions, judgment calls...">${esc(b.notes ?? '')}</textarea>
      </div>
      <div class="btnrow">
        <button class="primary" onclick="saveBid()">Save</button>
        <span class="saved" id="saved"></span>
      </div>
    </div>
    <div class="section">
      <h3>Plans &amp; AI takeoff</h3>
      <div class="plans" id="plans">loading…</div>
      <div class="btnrow">
        <button class="secondary" id="btn-fetch" onclick="fetchPlansUI()">Fetch plans + auto-takeoff</button>
        <button class="secondary" id="btn-takeoff" onclick="runTakeoffUI()">Run AI takeoff</button>
        <span class="saved" id="takeoff-msg"></span>
      </div>
      <div id="aibox">${renderAibox(b)}</div>
    </div>
    <div class="section">
      <h3>Proposal &amp; send</h3>
      <div class="btnrow">
        <button class="secondary" onclick="genProposal()">Generate proposal PDF</button>
        <span id="prop-link">${b.proposalFile ? `<a href="/proposals/${esc(b.proposalFile)}" target="_blank">estimate #${esc(String(b.estimateNo))} (PDF)</a>` : ''}</span>
      </div>
      <div class="sendgrid">
        <input type="text" id="send-to" placeholder="recipient email" value="${esc(b.contactEmail ?? '')}">
        <input type="text" id="send-subject" value="${esc('Proposal — ' + (b.project ?? '') + ' — Epoxy Creations LLC')}">
      </div>
      <div class="btnrow">
        <button class="primary" onclick="sendToGC()">Send to GC…</button>
        <span class="saved" id="send-msg">${b.sentAt ? 'sent ' + new Date(b.sentAt).toLocaleDateString() + ' to ' + esc(b.sentTo ?? '') : ''}</span>
      </div>
      <div id="send-extra"></div>
    </div>
    <div class="section">
      <h3>Emails (${b.emails?.length ?? 0})</h3>
      <div class="emails">${(b.emails ?? []).slice().reverse().map(e =>
        `<div class="em"><span class="kind">${esc(e.kind)}</span><span>${esc(e.subject)}</span></div>`).join('')}</div>
    </div>`;
  ['q-system', 'q-sqft', 'q-cove'].forEach(id => $('#' + id).addEventListener('input', price));
  document.querySelectorAll('input[name=prep]').forEach(el => el.addEventListener('change', price));
  price();
  loadPlans();
}

function renderAibox(b) {
  const a = b.aiTakeoff;
  if (!a) return '';
  return `<div class="aibox">
    <span class="conf">AI takeoff · ${esc(a.confidence)} confidence</span>
    ${a.execSummary ? `<div style="margin:4px 0 8px"><b>The job:</b> ${esc(a.execSummary)}</div>` : ''}
    <div><b>Our scope:</b> ${esc(a.summary)}</div>
    ${a.judgmentCalls?.length ? `<div style="margin-top:6px"><b>Verify:</b><ul>${a.judgmentCalls.map(j => `<li>${esc(j)}</li>`).join('')}</ul></div>` : ''}
    ${a.opportunities?.length ? `<div style="margin-top:6px"><b>Opportunities:</b><ul>${a.opportunities.map(o => `<li>${esc(o)}</li>`).join('')}</ul></div>` : ''}
  </div>`;
}

async function loadPlans() {
  const p = await fetch('/api/bids/' + encodeURIComponent(selKey) + '/plans').then(r => r.json());
  const b = bids[selKey];
  $('#plans').innerHTML = p.files.length
    ? `${p.files.map(esc).join(' · ')}`
    : `No plan files yet.${b.rfpId || b.link ? ' Click <b>Fetch plans</b> to pull them from BuildingConnected automatically.' : ''}<br>Manual drop folder: <code>${esc(p.dir)}</code>`;
  $('#btn-takeoff').disabled = !p.files.length;
  $('#btn-fetch').disabled = !!p.files.length || !(b.rfpId || b.link);
  const [s, f] = await Promise.all([
    fetch('/api/bids/' + encodeURIComponent(selKey) + '/takeoff-status').then(r => r.json()),
    fetch('/api/bids/' + encodeURIComponent(selKey) + '/fetch-status').then(r => r.json()),
  ]);
  if (f.status === 'running') watchFetch();
  else if (s.status === 'running') watchTakeoff();
}

async function fetchPlansUI() {
  const r = await fetch('/api/bids/' + encodeURIComponent(selKey) + '/fetch-plans', { method: 'POST' }).then(r => r.json());
  if (r.error) { $('#takeoff-msg').textContent = r.error; return; }
  watchFetch();
}

let fetchTimer = null;
function watchFetch() {
  const key = selKey;
  $('#btn-fetch').disabled = true;
  $('#btn-takeoff').disabled = true;
  $('#takeoff-msg').textContent = 'downloading plans from BuildingConnected… (if a browser window opens asking to log in, sign in once)';
  clearInterval(fetchTimer);
  fetchTimer = setInterval(async () => {
    const f = await fetch('/api/bids/' + encodeURIComponent(key) + '/fetch-status').then(r => r.json());
    if (f.status === 'running') return;
    clearInterval(fetchTimer);
    if (key !== selKey) return;
    if (f.status === 'error') { $('#takeoff-msg').textContent = 'plan fetch failed: ' + f.error; $('#btn-fetch').disabled = false; return; }
    // fetch done — the server chains straight into the AI takeoff
    watchTakeoff();
  }, 3000);
}

async function runTakeoffUI() {
  const r = await fetch('/api/bids/' + encodeURIComponent(selKey) + '/takeoff', { method: 'POST' }).then(r => r.json());
  if (r.error) { $('#takeoff-msg').textContent = r.error; return; }
  watchTakeoff();
}

let takeoffTimer = null;
function watchTakeoff() {
  const key = selKey;
  $('#btn-takeoff').disabled = true;
  $('#takeoff-msg').textContent = 'reading plans… (a few minutes)';
  clearInterval(takeoffTimer);
  takeoffTimer = setInterval(async () => {
    const s = await fetch('/api/bids/' + encodeURIComponent(key) + '/takeoff-status').then(r => r.json());
    if (s.status === 'running') return;
    clearInterval(takeoffTimer);
    if (key !== selKey) return;
    if (s.status === 'error') { $('#takeoff-msg').textContent = 'failed: ' + s.error; $('#btn-takeoff').disabled = false; return; }
    bids = await fetch('/api/bids').then(r => r.json());
    renderList(); renderPanel();
  }, 3000);
}

async function genProposal() {
  await saveBid();
  const r = await fetch('/api/bids/' + encodeURIComponent(selKey) + '/proposal', { method: 'POST' }).then(r => r.json());
  if (r.error) { $('#prop-link').textContent = r.error; return; }
  bids[selKey].proposalFile = r.file.split('/').pop();
  bids[selKey].estimateNo = r.estimateNo;
  $('#prop-link').innerHTML = `<a href="${r.file}" target="_blank">estimate #${r.estimateNo} (PDF)</a> — ${money(r.total)}`;
}

async function sendToGC() {
  const to = $('#send-to').value.trim();
  const subject = $('#send-subject').value.trim();
  const b = bids[selKey];
  if (!b.proposalFile) { $('#send-msg').textContent = 'generate the proposal first'; return; }
  if (!to) { $('#send-msg').textContent = 'enter a recipient'; return; }
  if (!confirm(`Send estimate #${b.estimateNo} for "${b.project}" to ${to}?\n\nThis emails the proposal PDF from your account.`)) return;
  $('#send-msg').textContent = 'sending…';
  const body = `Hello,\n\nPlease find attached our proposal (estimate #${b.estimateNo}) for ${b.project}.\n\nThank you,\nAleem Javed\nEpoxy Creations LLC\n(321) 328-0030`;
  const r = await fetch('/api/bids/' + encodeURIComponent(selKey) + '/send', { method: 'POST', body: JSON.stringify({ to, subject, body }) });
  const out = await r.json();
  if (out.sent) { $('#send-msg').textContent = 'sent ✓'; bids[selKey].status = 'sent'; renderList(); return; }
  if (out.code === 'NO_AUTH') return sendAuthFlow();
  if (out.code === 'NO_PERMISSION') {
    $('#send-extra').innerHTML = `<div class="warn"><b>One-time setup needed:</b> the Entra app is missing the <b>Mail.Send</b> permission. In entra.microsoft.com open App registrations → EpoxyCreations Estimator → API permissions → Add a permission → Microsoft Graph → Delegated → <b>Mail.Send</b> → Add. Then click Send again.</div>`;
    $('#send-msg').textContent = '';
    return;
  }
  $('#send-msg').textContent = out.error ?? 'failed';
}

async function sendAuthFlow() {
  $('#send-msg').textContent = '';
  const dc = await fetch('/api/send-auth/start', { method: 'POST' }).then(r => r.json());
  if (dc.error) { $('#send-msg').textContent = dc.error; return; }
  $('#send-extra').innerHTML = `<div class="warn"><b>One-time sign-in for sending:</b> open <a href="${esc(dc.url)}" target="_blank">${esc(dc.url)}</a> and enter code <b style="font-size:15px">${esc(dc.userCode)}</b>, then approve. Waiting…</div>`;
  const timer = setInterval(async () => {
    const s = await fetch('/api/send-auth/poll', { method: 'POST', body: JSON.stringify({ deviceCode: dc.deviceCode }) }).then(r => r.json());
    if (s.status === 'pending') return;
    clearInterval(timer);
    if (s.status === 'done') { $('#send-extra').innerHTML = ''; $('#send-msg').textContent = 'signed in — click Send again'; }
    else $('#send-extra').innerHTML = `<div class="warn">Sign-in failed: ${esc(s.error ?? '')}</div>`;
  }, 4000);
}

async function price() {
  const sqft = Number($('#q-sqft').value);
  if (!sqft) { $('#q-out').textContent = 'Enter a takeoff to price.'; return; }
  const body = takeoffFromForm();
  const q = await fetch('/api/quote', { method: 'POST', body: JSON.stringify(body) }).then(r => r.json());
  if (q.error) { $('#q-out').textContent = q.error; return; }
  $('#q-out').innerHTML =
    q.lines.map(l => `<div class="ln"><span>${esc(l.label)}</span><span>${money(l.amount)}</span></div>`).join('') +
    (q.floored ? `<div class="note">raised to job minimum</div>` : '') +
    `<div class="total"><span>Total</span><span>${money(q.total)}</span></div>` +
    `<div class="note">Valid ${q.validityDays} days · ${q.notes.map(esc).join(' ')}</div>`;
}

function takeoffFromForm() {
  return {
    system: $('#q-system').value,
    sqft: Number($('#q-sqft').value) || 0,
    coveLf: Number($('#q-cove').value) || 0,
    prep: [...document.querySelectorAll('input[name=prep]:checked')].map(el => el.value),
  };
}

async function saveBid() {
  const patch = { status: $('#status').value, notes: $('#notes').value, takeoff: takeoffFromForm() };
  bids[selKey] = await fetch('/api/bids/' + encodeURIComponent(selKey), { method: 'POST', body: JSON.stringify(patch) }).then(r => r.json());
  $('#saved').textContent = 'saved ✓';
  setTimeout(() => { const el = $('#saved'); if (el) el.textContent = ''; }, 1500);
  renderList();
}

function select(k) { selKey = k; renderList(); renderPanel(); }
function render() { renderFilters(); renderList(); }

(async () => {
  [bids, rules] = await Promise.all([
    fetch('/api/bids').then(r => r.json()),
    fetch('/api/rules').then(r => r.json()),
  ]);
  render();
})();

// Live refresh: pick up pipeline/agent updates without a manual reload.
// Skips re-rendering the detail panel while the user is typing in it.
let lastSnapshot = null;
setInterval(async () => {
  try {
    const fresh = await fetch('/api/bids').then(r => r.json());
    const snap = JSON.stringify(fresh);
    if (snap === lastSnapshot) return;
    const editing = document.activeElement && document.querySelector('.panel')?.contains(document.activeElement) &&
      ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName);
    lastSnapshot = snap;
    bids = fresh;
    renderFilters();
    renderList();
    if (selKey && !editing) renderPanel();
  } catch {}
}, 15000);
</script>
</body>
</html>
