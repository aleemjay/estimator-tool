# EpoxyCreations pricing rules — encoded from AJ's pricing interview (July 2026).
# Status: DRAFT — sections marked TODO are not yet interviewed/confirmed.
# All rates USD. sqft tiers are "min sqft of the job → rate per sqft".

systems:
  epoxy_flake:
    label: Decorative Flake
    unit: sqft
    tiers:
      - { min: 0, rate: 5.00 }
      - { min: 1000, rate: 4.00 }
      - { min: 5000, rate: 3.50 }
  quartz:
    label: Decorative Quartz (double broadcast)
    unit: sqft
    tiers:
      - { min: 0, rate: 12.00 }
      - { min: 2500, rate: 10.00 }
      - { min: 7500, rate: 8.50 }
  urethane_cement:
    label: Urethane Cement (kitchens / wet areas)
    unit: sqft
    tiers:
      - { min: 0, rate: 12.00 }
      - { min: 2500, rate: 10.50 }
      - { min: 7500, rate: 9.00 }
  solid_color_epoxy:
    label: Solid-Color Epoxy (High-Build)
    unit: sqft
    tiers:
      - { min: 0, rate: 6.00 }
      - { min: 2500, rate: 5.00 }
      - { min: 7500, rate: 4.25 }
  polished_concrete:
    label: Polished Concrete
    unit: sqft
    tiers:
      - { min: 0, rate: 5.00 }
      - { min: 2500, rate: 4.25 }
      - { min: 7500, rate: 3.50 }
  sealed_concrete:
    label: Sealed Concrete (Densifier / Grind & Seal)
    unit: sqft
    tiers:
      - { min: 0, rate: 2.00 }
      - { min: 2500, rate: 1.65 }
      - { min: 7500, rate: 1.35 }

line_items:
  cove_base:
    label: Integral Cove Base (4" or 6")
    unit: lf
    tiers:
      - { min: 0, rate: 20.00 }
      # Over 1,000 LF can scale to 16.00–18.00 with pre-form / efficient
      # trowel crew — draft at 18.00, AJ adjusts per job.
      - { min: 1000, rate: 18.00 }

prep:
  standard_diamond_grind:
    label: Standard Diamond Grind
    billing: included_in_base
    rate: 0.00
  heavy_corrective_grinding:
    label: Heavy / Corrective Grinding
    billing: separate_line_item
    unit: sqft
    rate_range: [0.75, 1.25]
    draft_rate: 1.00
    proposal_line: Aggressive diamond grinding to correct surface irregularities and achieve the required concrete surface profile.
  shot_blasting:
    label: Shot Blasting (CSP 3-5)
    billing: separate_line_item # standalone or upgrade adder
    unit: sqft
    rate_range: [1.50, 2.25]
    draft_rate: 1.85
    proposal_line: Shot blasting of the concrete substrate to achieve a CSP 3-5 profile for maximum system adhesion.
  moisture_vapor_barrier:
    label: Moisture Vapor Barrier
    billing: excluded_by_default
    unit: sqft
    rate_range: [3.50, 4.50]
    draft_rate: 4.00
    # AJ 2026-07-12: no MVB exclusion note on quotes/proposals.
  coating_glue_removal:
    label: Thick Coating / Glue Removal
    billing: separate_line_item
    unit: sqft
    rate_range: [1.50, 3.00]
    draft_rate: 2.00
    proposal_line: Mechanical removal of existing thick coatings, glue, and adhesive residue down to sound concrete.
  crack_joint_repair:
    label: Crack & Joint Repair
    billing: allowance_plus_overage
    unit: lf
    overage_rate: 5.00
    allowance: per_job # AJ sets the included allowance job-by-job

aliases:
  # Invite trades map onto systems; "fluid-applied flooring" prices as
  # urethane cement (confirmed by AJ).
  fluid_applied_flooring: urethane_cement
job_rules:
  minimum_contract: 1000.00 # base contract rounds UP to this floor
  travel_mobilization: 0.00 # absorbed into base rates — no distance bands
  extra_mobilizations: 0.00 # phased schedules: no penalty fee
  night_weekend_uplift: 0.00 # off-hours quoted same as daytime
  gc_adjustments: none # same numbers for every GC — no premiums/discounts

presentation:
  round_total_to_nearest: 500
  quote_validity_days: 60
  warranty: omit # never mention warranty on proposals
  payment_terms: flexible # negotiated with each contractor; no rigid terms on proposals
  deposit: 500.00 # typical on small/residential direct work (Joist #417); GC bids usually none

# Proposal boilerplate — structured to mirror Joist estimate #418 exactly:
# title, intro, "1. System Description", "2. Proposed Scope of Work"
# (Surface Preparation / Installation subheads), Estimated Coverage.
proposal_language:
  site_measure_note: >
    This quotation is based on client-provided dimensions. Final project
    totals are subject to adjustment should on-site measurements reveal a
    larger service area than initially estimated.
  scope_templates:
    quartz:
      title: BLENDED QUARTZ SYSTEM
      short_name: Blended Quartz System
      intro: This proposal outlines the supply and professional installation of a LATICRETE SPARTACOTE BLENDED QUARTZ or similar Flooring System.
      system_description:
        - "Epoxy 1150FC base: A self-leveling epoxy base layer, pigmented and broadcast to rejection with colored quartz."
        - "Polyaspartic HS Slow Cure: A UV-stable, clear topcoat for added durability and chemical resistance."
      surface_preparation:
        - Concrete preparation to CSP 3-5
        - Crack repair and patching as needed
      installation:
        - Application of pigmented Epoxy 1150FC
        - Full quartz broadcast to rejection
        - Clear polyaspartic topcoat application
    epoxy_flake:
      title: HYBRID FULL FLAKE FLOORING SYSTEM
      short_name: Hybrid Full Flake System
      intro: This proposal outlines the supply and professional installation of a premium multi-layer Hybrid Full Flake coating system.
      system_description:
        - "Pigmented epoxy base: A 100% solids, 10lb moisture-mitigating pigmented epoxy barrier."
        - "Decorative broadcast: 1/4\" decorative vinyl flakes installed to full rejection."
        - "Polyaspartic clear topcoat: A high-durability, UV-resistant topcoat for long-term wear protection."
      surface_preparation:
        - Mechanical diamond grinding of the concrete to a specific Surface Profile (CSP) to ensure maximum adhesion
        - Thorough cleaning and industrial vacuuming of the substrate
        - Repair of minor cracks and voids using a moisture-tolerant epoxy/fiber filler
      installation:
        - Application of the pigmented epoxy base coat
        - Full-distribution flake broadcast to rejection
        - Scrape, sand, and vacuum of the cured broadcast
        - Clear polyaspartic topcoat application
    urethane_cement:
      title: URETHANE CEMENT FLOORING SYSTEM
      short_name: Urethane Cement System
      intro: This proposal outlines the supply and professional installation of a cementitious urethane flooring system rated for thermal shock, wash-down, and chemical exposure.
      system_description:
        - "Urethane cement body coat: A self-leveling cementitious urethane installed at manufacturer-specified thickness."
        - "Chemical-resistant topcoat: A UV-stable topcoat for added durability and chemical resistance."
      surface_preparation:
        - Mechanical diamond grinding / shot blasting to CSP 3-5
        - Keyway cuts at terminations, drains, and transitions to lock the system in
        - Crack repair and patching as needed
      installation:
        - Application of the self-leveling urethane cement body coat
        - Slip-resistant aggregate broadcast where specified
        - Chemical-resistant topcoat application
    solid_color_epoxy:
      title: SOLID-COLOR HIGH-BUILD EPOXY SYSTEM
      short_name: Solid-Color Epoxy System
      intro: This proposal outlines the supply and professional installation of a 100% solids, high-build pigmented epoxy flooring system.
      system_description:
        - "High-build pigmented epoxy: A 100% solids epoxy body coat for a seamless, durable finish."
        - "Protective topcoat: A high-durability clear topcoat for UV resistance and long-term wear protection."
      surface_preparation:
        - Mechanical diamond grinding of the concrete to a specific Surface Profile (CSP) to ensure maximum adhesion
        - Thorough cleaning and industrial vacuuming of the substrate
        - Repair of minor cracks and voids using a moisture-tolerant epoxy/fiber filler
      installation:
        - Application of the pigmented high-build epoxy body coat
        - Slip-resistant aggregate broadcast where specified
        - Clear protective topcoat application
    polished_concrete:
      title: POLISHED CONCRETE SYSTEM
      short_name: Polished Concrete System
      intro: This proposal outlines the mechanical grinding, honing, and polishing of the concrete slab to the specified gloss level.
      system_description:
        - "Progressive diamond polishing: Metal-bond and resin-bond diamond tooling through the specified grit sequence."
        - "Penetrating densifier: Hardens the slab surface for durability and abrasion resistance."
        - "Stain guard: A penetrating protective treatment for stain resistance and ease of maintenance."
      surface_preparation:
        - Initial metal-bond grinding to expose and flatten the surface
        - Patching and repair of surface defects as needed
      installation:
        - Progressive resin-bond polishing steps to the specified gloss level
        - Densifier application at the specified grit stage
        - Final polish and stain-guard application with burnish
    sealed_concrete:
      title: SEALED CONCRETE (DENSIFIER / GRIND & SEAL)
      short_name: Sealed Concrete System
      intro: This proposal outlines the cleaning, preparation, and sealing of the exposed concrete surface for a smooth, dust-proofed, sealed finish.
      system_description:
        - "Cleaner / densifier: A penetrating treatment that cleans and hardens the concrete surface."
        - "Protective sealer: Multiple sealer coats applied per manufacturer specification."
      surface_preparation:
        - Thorough cleaning and degreasing of the exposed concrete
        - Light mechanical grinding where required for adhesion
        - Repair and patching of minor surface defects as needed
      installation:
        - Application of penetrating cleaner/densifier
        - Application of protective sealer coats per manufacturer specification
    cove_base:
      title: 4" Cove Base
      intro: Installation of a Cove Base. This system forms a 4" vertical cove up the wall.
      highlights:
        - Walls are primed to ensure proper adhesion.
        - Cove base mix is applied to the wall base at approximately 1/8"-3/16" thickness.
        - Material is troweled to form a consistent and compact cove with a clean edge finish.
        - Acetone is used during application for smoothing and tool cleaning to ensure a professional finish.
