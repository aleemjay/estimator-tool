# EpoxyCreations pricing rules — encoded from AJ's pricing interview (July 2026).
# Status: DRAFT — sections marked TODO are not yet interviewed/confirmed.
# All rates USD. sqft tiers are "min sqft of the job → rate per sqft".

systems:
  epoxy_flake:
    label: Decorative Flake
    unit: sqft
    tiers:
      - { min: 0, rate: 5.00 }
      - { min: 1000, rate: 4.00 }
      - { min: 5000, rate: 3.50 }
  quartz:
    label: Decorative Quartz (double broadcast)
    unit: sqft
    tiers:
      - { min: 0, rate: 12.00 }
      - { min: 2500, rate: 10.00 }
      - { min: 7500, rate: 8.50 }
  urethane_cement:
    label: Urethane Cement (kitchens / wet areas)
    unit: sqft
    tiers:
      - { min: 0, rate: 12.00 }
      - { min: 2500, rate: 10.50 }
      - { min: 7500, rate: 9.00 }
  solid_color_epoxy:
    label: Solid-Color Epoxy (High-Build)
    unit: sqft
    tiers:
      - { min: 0, rate: 6.00 }
      - { min: 2500, rate: 5.00 }
      - { min: 7500, rate: 4.25 }
  polished_concrete:
    label: Polished Concrete
    unit: sqft
    tiers:
      - { min: 0, rate: 5.00 }
      - { min: 2500, rate: 4.25 }
      - { min: 7500, rate: 3.50 }
  sealed_concrete:
    label: Sealed Concrete (Densifier / Grind & Seal)
    unit: sqft
    tiers:
      - { min: 0, rate: 2.00 }
      - { min: 2500, rate: 1.65 }
      - { min: 7500, rate: 1.35 }

line_items:
  cove_base:
    label: Integral Cove Base (4" or 6")
    unit: lf
    tiers:
      - { min: 0, rate: 20.00 }
      # Over 1,000 LF can scale to 16.00–18.00 with pre-form / efficient
      # trowel crew — draft at 18.00, AJ adjusts per job.
      - { min: 1000, rate: 18.00 }

prep:
  standard_diamond_grind:
    label: Standard Diamond Grind
    billing: included_in_base
    rate: 0.00
  heavy_corrective_grinding:
    label: Heavy / Corrective Grinding
    billing: separate_line_item
    unit: sqft
    rate_range: [0.75, 1.25]
    draft_rate: 1.00
  shot_blasting:
    label: Shot Blasting (CSP 3-5)
    billing: separate_line_item # standalone or upgrade adder
    unit: sqft
    rate_range: [1.50, 2.25]
    draft_rate: 1.85
  moisture_vapor_barrier:
    label: Moisture Vapor Barrier
    billing: excluded_by_default
    unit: sqft
    rate_range: [3.50, 4.50]
    draft_rate: 4.00
    # AJ 2026-07-12: no MVB exclusion note on quotes/proposals.
  coating_glue_removal:
    label: Thick Coating / Glue Removal
    billing: separate_line_item
    unit: sqft
    rate_range: [1.50, 3.00]
    draft_rate: 2.00
  crack_joint_repair:
    label: Crack & Joint Repair
    billing: allowance_plus_overage
    unit: lf
    overage_rate: 5.00
    allowance: per_job # AJ sets the included allowance job-by-job

aliases:
  # Invite trades map onto systems; "fluid-applied flooring" prices as
  # urethane cement (confirmed by AJ).
  fluid_applied_flooring: urethane_cement
job_rules:
  minimum_contract: 1000.00 # base contract rounds UP to this floor
  travel_mobilization: 0.00 # absorbed into base rates — no distance bands
  extra_mobilizations: 0.00 # phased schedules: no penalty fee
  night_weekend_uplift: 0.00 # off-hours quoted same as daytime
  gc_adjustments: none # same numbers for every GC — no premiums/discounts

presentation:
  round_total_to_nearest: 500
  quote_validity_days: 60
  warranty: omit # never mention warranty on proposals
  payment_terms: flexible # negotiated with each contractor; no rigid terms on proposals
  deposit: 500.00 # typical on small/residential direct work (Joist #417); GC bids usually none

# Proposal boilerplate — extracted from real Joist estimates #417 and #418.
proposal_language:
  site_measure_note: >
    This quotation is based on client-provided dimensions. Final project
    totals are subject to adjustment should on-site measurements reveal a
    larger service area than initially estimated.
  scope_templates:
    epoxy_flake:
      title: Hybrid Full Flake Flooring System
      bullets:
        - Premium multi-layer coating application including surface preparation, base coat, decorative broadcast, and high-performance topcoat.
        - "Surface Preparation: Mechanically diamond-grind concrete to a specific Surface Profile (CSP) to ensure maximum adhesion."
        - "Site Remediation: Thorough cleaning and industrial vacuuming of the substrate; repair of minor cracks and voids using a moisture-tolerant epoxy/fiber filler."
        - "Base Coat Application: Installation of a 100% solids, 10lb moisture-mitigating pigmented epoxy barrier."
        - "Decorative Broadcast: Full-distribution (to rejection) of 1/4\" decorative vinyl flakes."
        - "Topcoat Protection: Application of a high-durability Polyaspartic clear topcoat for UV resistance and long-term wear protection."
    quartz:
      title: Blended Quartz System
      bullets:
        - Supply and professional installation of a LATICRETE SPARTACOTE BLENDED QUARTZ or similar Flooring System.
        - "Epoxy 1150FC base: a self-leveling epoxy base layer, pigmented and broadcast to rejection with colored quartz."
        - "Polyaspartic HS Slow Cure: a UV-stable, clear topcoat for added durability and chemical resistance."
        - "Surface Preparation: concrete preparation to CSP 3-5; crack repair and patching as needed."
    cove_base:
      title: 4" Cove Base
      bullets:
        - Installation of a cove base forming a 4" vertical cove up the wall.
        - Walls are primed to ensure proper adhesion.
        - Cove base mix applied to the wall base at approximately 1/8"-3/16" thickness, troweled to a consistent and compact cove with a clean edge finish.
    # Templates below drafted to match the Joist voice — AJ to review wording.
    urethane_cement:
      title: Urethane Cement Flooring System
      bullets:
        - Supply and professional installation of a cementitious urethane flooring system rated for thermal shock, wash-down, and chemical exposure.
        - "Surface Preparation: mechanical diamond grind / shot blast to the specified concrete surface profile (CSP)."
        - Self-leveling urethane cement body coat installed at manufacturer-specified thickness.
        - UV-stable, chemical-resistant topcoat for long-term wear protection.
    solid_color_epoxy:
      title: Solid-Color High-Build Epoxy System
      bullets:
        - "Surface Preparation: mechanically diamond-grind concrete to a specific Surface Profile (CSP) to ensure maximum adhesion."
        - "Site Remediation: thorough cleaning and industrial vacuuming of the substrate; repair of minor cracks and voids using a moisture-tolerant epoxy/fiber filler."
        - Installation of a 100% solids pigmented high-build epoxy body coat.
        - High-durability clear topcoat for UV resistance and long-term wear protection.
    polished_concrete:
      title: Polished Concrete System
      bullets:
        - Mechanical grinding, honing, and polishing of the concrete slab to the specified gloss level using progressive diamond tooling.
        - Application of penetrating densifier to harden the slab surface.
        - Final stain-guard / sealer application for stain resistance and ease of maintenance.
    sealed_concrete:
      title: Sealed Concrete (Densifier / Grind & Seal)
      bullets:
        - Thorough cleaning and preparation of the exposed concrete surface.
        - Repair and patching of minor surface defects as needed.
        - Application of penetrating cleaner/densifier and protective sealer coats per manufacturer specification for a smooth, dust-proofed, sealed finish.
